<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>랜덤 강아지 사진</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="theme-toggle">
    <button id="theme-btn">🌓 테마 변경</button>
  </div>
  <div class="container">
    <section class="dog-section">
      <h1>오늘의 강아지 🐶</h1>
      <div id="dog-container">
        <p>강아지 사진을 불러오는 중...</p>
      </div>
      <div class="button-group">
        <button id="new-dog-btn">다른 강아지 보기</button>
      </div>
    </section>

    <hr class="divider">

    <section class="partnership-section">
      <h2>🐾 제휴 문의</h2>
      <p>강아지 제품 관련 제휴 제안을 기다립니다!</p>
      <form action="https://formspree.io/f/xeenbvjb" method="POST" class="inquiry-form">
        <div class="form-group">
          <label for="name">성함 / 업체명</label>
          <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력하세요">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" required placeholder="제휴 관련 내용을 자유롭게 적어주세요"></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </section>
  </div>
  <script src="main.js"></script>
</body>
</html>
